$kind: http-request
name: Log in a user
url: "{{baseUrl}}/v1/users/login"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "username": "string",
      "password": "string"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "username": {
          "type": "string"
        },
        "password": {
          "type": "string"
        }
      }
    }
scripts:
  - type: afterResponse
    code: |-
      pm.variables.set("id", 4474);
      pm.variables.set("username", "Shirley.Schaden90");
      pm.variables.set("password", "7_jE8Hve20cjcfC");
    language: text/javascript
examples: ./.resources/Log in a user.resources/examples
order: 1000
