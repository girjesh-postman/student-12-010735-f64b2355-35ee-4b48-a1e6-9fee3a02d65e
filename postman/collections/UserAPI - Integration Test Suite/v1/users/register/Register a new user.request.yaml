$kind: http-request
name: Register a new user
url: "{{baseUrl}}/v1/users/register"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
queryParams:
  - key: ""
    value: ""
    disabled: true
body:
  type: json
  content: |-
    {
      "username": "{{username}}",
      "password": "{{password}}"
    }
scripts:
  - type: beforeRequest
    code: |-
      pm.variables.set("username", pm.variables.replaceIn("{{$randomUserName}}"));
      pm.variables.set("password", pm.variables.replaceIn("{{$randomPassword}}"));
    language: text/javascript
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();

      pm.variables.set("id", jsonData.id);

      pm.test("Status code is 201", function () {
          pm.response.to.have.status(201);
      });

      console.log(pm.variables.get('username'));
      console.log(pm.variables.get('password'));
    language: text/javascript
examples: ./.resources/Register a new user.resources/examples
order: 1000
